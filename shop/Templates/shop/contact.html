{% extends "shop/basic.html" %}

{% block title %} Contact Us - My Awesome Cart {% endblock %}

{% block body %}
<div class="container my-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            
            {% if thank %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <strong>Success!</strong> Your message has been sent. We will get back to you shortly.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <h2 class="mb-4">Contact Us</h2>
            <form action="/shop/contact/" method="post">
                {% csrf_token %}
                
                <div class="form-group mb-3">
                    <label for="name" class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group mb-3">
                    <label for="email" class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group mb-3">
                    <label for="phone" class="form-label fw-semibold">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group mb-3">
                    <label for="desc" class="form-label fw-semibold">How can we help you?</label>
                    <textarea class="form-control" id="desc" name="desc" rows="4" placeholder="Tell us about your concern..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-4">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
